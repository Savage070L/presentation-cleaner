<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watermark Remover Web</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <h1>Presentation Cleaner</h1>
      </header>

      <section class="panel">
        <h2>Входные файлы</h2>
        <input id="fileInput" type="file" multiple accept=".pdf,.pptx,.PDF,.PPTX" />
        <p class="hint">Файлы не отправляются на сервер, обработка идет только на вашем устройстве.</p>
      </section>

      <section class="panel options">
        <h2>Параметры NotebookLM</h2>
        <label class="row inline">
          <input id="removeDefault" type="checkbox" checked />
          Удалять дефолтный водяной знак NotebookLM
        </label>
      </section>

      <section class="panel browser">
        <h2>Дополнительные области</h2>
        <div class="browser-top">
          <label>
            Файл
            <select id="browserFileSelect"></select>
          </label>
          <span id="areasSummary" class="hint">Доп. области: 0</span>
        </div>
        <div class="browser-main">
          <aside id="thumbs" class="thumbs"></aside>
          <div class="preview-col">
            <div class="preview-toolbar">
              <button id="prevBtn" type="button">Назад</button>
              <span id="pageIndicator">— / —</span>
              <button id="nextBtn" type="button">Вперед</button>
              <button id="removeLastBtn" type="button" class="secondary">Удалить последнюю</button>
              <button id="clearPageBtn" type="button" class="secondary">Очистить страницу</button>
            </div>
            <div id="previewWrap" class="preview-wrap">
              <canvas id="previewCanvas"></canvas>
            </div>
          </div>
        </div>
      </section>

      <section class="panel actions">
        <button id="processBtn">Обработать и скачать</button>
      </section>

      <section class="panel">
        <h2>Лог</h2>
        <pre id="log"></pre>
      </section>
    </main>

    <script src="https://docs.opencv.org/4.10.0/opencv.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
